<div class="ui-toast-stack" *ngIf="toastService.toasts().length">
  <button
    *ngFor="let toast of toastService.toasts()"
    type="button"
    class="ui-toast-item"
    [class.ui-toast-item--success]="toast.type === 'success'"
    [class.ui-toast-item--error]="toast.type === 'error'"
    [class.ui-toast-item--info]="toast.type === 'info'"
    (click)="handleClick(toast)"
  >
    <span class="ui-toast-item__badge">
      {{ toast.type === 'success' ? 'OK' : toast.type === 'error' ? 'ERR' : 'NEW' }}
    </span>
    <span class="ui-toast-item__message">{{ toast.message }}</span>
    <span *ngIf="toast.action && toast.actionLabel" class="ui-toast-item__action">
      {{ toast.actionLabel }} →
    </span>
  </button>
</div>
