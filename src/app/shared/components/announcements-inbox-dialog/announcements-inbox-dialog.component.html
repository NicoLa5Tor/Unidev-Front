<div class="flex h-full max-h-[80vh] min-h-[320px] flex-col rounded-2xl border border-[color:var(--panel-border)] bg-[var(--panel)] shadow-2xl">

  <!-- Header -->
  <div class="flex shrink-0 items-center justify-between border-b border-[color:var(--panel-border)] px-6 py-4">
    <div>
      <h2 class="font-cyber text-sm font-bold text-[var(--text)]">Comunicados</h2>
      <p class="font-tech text-[10px] uppercase tracking-[0.25em] text-[var(--muted)]">Mensajes oficiales de UniDev</p>
    </div>
    <button (click)="close()" class="rounded-lg p-1.5 text-[var(--muted)] transition-colors hover:bg-[var(--panel-2)] hover:text-[var(--text)]">
      <svg class="h-4 w-4" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M3 3l10 10M13 3L3 13"/>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto px-4 py-3">

    <!-- Loading -->
    <div *ngIf="loading" class="flex items-center justify-center py-10">
      <div class="h-5 w-5 animate-spin rounded-full border-2 border-[var(--accent-1)] border-t-transparent"></div>
    </div>

    <!-- Empty -->
    <div *ngIf="!loading && !announcements.length" class="flex flex-col items-center justify-center gap-2 py-12 text-center">
      <svg class="h-8 w-8 text-[var(--muted)]/40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <p class="font-tech text-xs uppercase tracking-[0.2em] text-[var(--muted)]">Sin comunicados</p>
    </div>

    <!-- List -->
    <div *ngIf="!loading && announcements.length" class="space-y-2">
      <div
        *ngFor="let a of announcements"
        class="rounded-xl border transition-colors duration-150 overflow-hidden"
        [ngClass]="isNew(a)
          ? 'border-[color:var(--accent-1)]/30 bg-[var(--accent-1)]/5'
          : 'border-[color:var(--panel-border)] bg-[var(--panel-2)]'"
      >
        <!-- Row header (clickable to expand) -->
        <button
          (click)="toggle(a.id)"
          class="flex w-full items-start gap-3 px-4 py-3 text-left"
        >
          <!-- New dot -->
          <span
            class="mt-1.5 h-2 w-2 shrink-0 rounded-full"
            [ngClass]="isNew(a) ? 'bg-[var(--accent-1)]' : 'bg-transparent'"
          ></span>

          <div class="min-w-0 flex-1">
            <p class="truncate font-tech text-xs font-semibold uppercase tracking-[0.15em]"
               [ngClass]="isNew(a) ? 'text-[var(--text)]' : 'text-[var(--muted)]'">
              {{ a.title }}
            </p>
            <p class="mt-0.5 font-tech text-[10px] uppercase tracking-[0.2em] text-[var(--muted)]">
              {{ a.sentAt | date:'dd MMM yyyy' }}
              <span *ngIf="a.targetRole" class="ml-2 rounded-full bg-[var(--accent-3)]/15 px-1.5 py-0.5 text-[var(--accent-3)]">{{ a.targetRole }}</span>
            </p>
          </div>

          <svg
            class="h-3 w-3 shrink-0 text-[var(--muted)] transition-transform duration-150 mt-1"
            [ngClass]="expanded === a.id ? 'rotate-90' : ''"
            viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
          >
            <path d="M6 3l5 5-5 5"/>
          </svg>
        </button>

        <!-- Expanded body -->
        <div *ngIf="expanded === a.id" class="border-t border-[color:var(--panel-border)] px-4 py-3">
          <p class="whitespace-pre-line font-tech text-xs leading-relaxed text-[var(--text)]/80">{{ a.body }}</p>
          <p class="mt-3 font-tech text-[10px] uppercase tracking-[0.2em] text-[var(--muted)]">
            Enviado por <span class="text-[var(--accent-3)]">{{ a.sentBy }}</span>
          </p>
        </div>
      </div>
    </div>

  </div>

</div>
