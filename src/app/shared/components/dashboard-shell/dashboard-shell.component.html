<div class="relative min-h-screen bg-[var(--bg)] px-4 py-10 text-[var(--text)] lg:px-10">
  <div class="absolute inset-0 bg-cyber-grid bg-grid opacity-10"></div>
  <div class="absolute top-0 left-0 h-1 w-full bg-gradient-to-r from-[var(--accent-1)] via-[var(--accent-2)] to-[var(--accent-3)]"></div>

  <header
    class="sticky top-0 z-30 w-full border-b border-[color:var(--panel-border)] bg-[var(--panel)]/95 px-4 shadow-[var(--shadow)] backdrop-blur transition-all duration-300 lg:px-10"
    [ngClass]="isHeaderCompact ? 'py-2' : 'py-4'"
  >
    <div class="mx-auto flex w-full flex-col gap-4" [ngClass]="contentWidthClass">
      <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-4">
          <div
            class="flex items-center justify-center rounded-2xl bg-gradient-to-r from-[var(--accent-1)] to-[var(--accent-2)] font-cyber text-[var(--text)] transition-all duration-300"
            [ngClass]="isHeaderCompact ? 'h-9 w-9 text-sm' : 'h-12 w-12 text-lg'"
          >
            {{ avatarLabel }}
          </div>
          <div>
            <p *ngIf="!isHeaderCompact && eyebrow" class="font-tech text-xs uppercase tracking-[0.3em] text-[var(--accent-3)]">
              {{ eyebrow }}
            </p>
            <h1
              class="bg-gradient-to-r from-[var(--accent-1)] via-[var(--accent-2)] to-[var(--accent-3)] bg-clip-text font-cyber font-bold text-transparent transition-all duration-300"
              [ngClass]="isHeaderCompact ? 'text-lg' : 'mt-1 text-2xl'"
            >
              {{ title }}
            </h1>
          </div>
        </div>

        <button
          class="rounded-2xl border border-[color:var(--panel-border)] bg-[var(--panel)] px-3 py-2 text-xs uppercase tracking-[0.2em] text-[var(--muted)] lg:hidden"
          (click)="toggleMobileMenu()"
        >
          Menu
        </button>
      </div>

      <nav class="hidden flex-wrap items-center justify-between gap-4 lg:flex" [ngClass]="isHeaderCompact ? 'pb-1' : ''">
        <div class="flex flex-wrap items-center gap-8 text-[11px] uppercase tracking-[0.36em]">
          <button
            *ngFor="let item of navItems"
            class="group relative pb-2 font-tech transition"
            (click)="selectTab(item.id)"
          >
            <span [ngClass]="navAccentText(item)">
              {{ item.label }}
            </span>
            <span
              class="absolute left-0 -bottom-1 h-[2px] w-full rounded-full transition-all duration-300"
              [ngClass]="[navAccentBar(item), navBarState(item)]"
            ></span>
          </button>
        </div>

        <div class="flex items-center gap-3 text-xs uppercase tracking-[0.2em] text-[var(--muted)]">
          <ng-content select="[dashboard-header-actions]"></ng-content>
          <label class="font-tech">Tema</label>
          <select
            class="rounded-full border border-[color:var(--panel-border)] bg-[var(--panel)] px-3 py-1 text-xs uppercase tracking-[0.2em] text-[var(--muted)] focus:border-[color:var(--accent-3)]/60 focus:outline-none"
            [ngModel]="currentTheme"
            (ngModelChange)="setTheme($event)"
          >
            <option *ngFor="let theme of themes" [value]="theme.id">{{ theme.label }}</option>
          </select>
          <button
            class="rounded-full border border-[color:var(--accent-2)]/40 bg-[var(--accent-2)]/15 px-3 py-1 font-tech text-[var(--accent-2)]"
            (click)="logout()"
          >
            Cerrar sesion
          </button>
        </div>
      </nav>

      <div *ngIf="isMobileMenuOpen" class="space-y-4 lg:hidden">
        <div class="flex flex-col gap-4 text-[11px] uppercase tracking-[0.36em]">
          <button *ngFor="let item of navItems" class="group relative pb-2 text-left font-tech transition" (click)="selectTab(item.id)">
            <span [ngClass]="navMobileText(item)">{{ item.label }}</span>
            <span
              class="absolute left-0 -bottom-1 h-[2px] rounded-full transition-all duration-300"
              [ngClass]="[item.mobileBarWidthClass || 'w-24', navAccentBar(item), activeTab === item.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-60']"
            ></span>
          </button>
        </div>

        <div class="flex flex-wrap items-center gap-3 text-xs uppercase tracking-[0.2em] text-[var(--muted)]">
          <ng-content select="[dashboard-header-actions-mobile]"></ng-content>
          <label class="font-tech">Tema</label>
          <select
            class="rounded-full border border-[color:var(--panel-border)] bg-[var(--panel)] px-3 py-1 text-xs uppercase tracking-[0.2em] text-[var(--muted)] focus:border-[color:var(--accent-3)]/60 focus:outline-none"
            [ngModel]="currentTheme"
            (ngModelChange)="setTheme($event)"
          >
            <option *ngFor="let theme of themes" [value]="theme.id">{{ theme.label }}</option>
          </select>
          <button
            class="rounded-full border border-[color:var(--accent-2)]/40 bg-[var(--accent-2)]/15 px-3 py-1 font-tech text-[var(--accent-2)]"
            (click)="logout()"
          >
            Cerrar sesion
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="relative mx-auto flex w-full flex-col gap-8 pt-10" [ngClass]="contentWidthClass">
    <ng-content></ng-content>
  </div>
</div>
