<section id="home" class="hero-intro text-white relative overflow-hidden">
  <video class="hero-video" autoplay muted loop playsinline preload="auto">
    <source src="https://cdn.zajno.com/dev/codepen/fossil/fossil.mp4" type="video/mp4" />
  </video>

  <div class="hero-overlay" aria-hidden="true"></div>
  <div class="hero-grid" aria-hidden="true"></div>
  <div class="hero-beam" aria-hidden="true"></div>

  <div class="hero-shell relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="hero-viewport">
      <div class="hero-main-stack">
        <div class="hero-title-block">
          <h1 class="hero-title" aria-label="Talento que sí ejecuta">
            <span class="hero-title__row">
              <span class="hero-title-fragment" data-shift="260">
                <span class="hero-title-fragment__text">Tal</span>
              </span>
              <span class="hero-title-fragment" data-shift="-220">
                <span class="hero-title-fragment__text">ento</span>
              </span>
              <span class="hero-title-fragment" data-shift="180">
                <span class="hero-title-fragment__text">que</span>
              </span>
            </span>
            <span class="hero-title__row hero-title__row--offset">
              <span class="hero-title-fragment" data-shift="-200">
                <span class="hero-title-fragment__text">sí</span>
              </span>
              <span class="hero-title-fragment" data-shift="320">
                <span class="hero-title-fragment__text">eje</span>
              </span>
              <span class="hero-title-fragment" data-shift="-260">
                <span class="hero-title-fragment__text">cuta</span>
              </span>
            </span>
          </h1>

          <div class="hero-note hero-note--bottom">
            <span class="hero-reveal">
              <span class="hero-reveal__inner">Retos reales, mentoría activa, señal profesional</span>
            </span>
          </div>
        </div>

        <div class="hero-dynamic-copy">
          <span class="hero-reveal">
            <span class="hero-reveal__inner">
              <span class="hero-dynamic-copy__prefix">Conectando estudiantes con</span>
              <span class="hero-dynamic-copy__keyword-wrap">
                <span class="hero-dynamic-copy__keyword">{{ typedText }}</span>
                <span class="hero-dynamic-copy__cursor">|</span>
              </span>
            </span>
          </span>
        </div>

        <div class="hero-summary hero-summary--bottom">
          <span class="hero-reveal">
            <span class="hero-reveal__inner">Postula, ejecuta y deja evidencia que una empresa sí puede leer.</span>
          </span>
        </div>
      </div>

      <div class="hero-bottom-meta">
        <div class="hero-copyright">
          <span class="hero-reveal">
            <span class="hero-reveal__inner">UniDev © 2026 / proyectos, mentoría y experiencia validable</span>
          </span>
        </div>

        <a class="hero-book-btn" data-magnetic routerLink="/pricing">
          <span class="hero-book-btn__circle" aria-hidden="true"></span>
          <span class="hero-book-btn__text hero-reveal">
            <span class="hero-reveal__inner">Comenzar ahora</span>
          </span>
        </a>
      </div>
    </div>

  </div>
</section>
