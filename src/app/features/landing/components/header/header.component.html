<header class="text-white border-b border-gray-700/40 backdrop-blur-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center py-4">
      
      <!-- Logo -->
      <a routerLink="/" class="flex items-center space-x-3">
        <div class="flex h-12 w-16 items-center justify-center rounded-xl bg-black/20 px-1 shadow-[0_0_24px_rgba(96,165,250,0.12)]">
          <img
            src="/Logo.png"
            alt="UniDev"
            class="h-10 w-full object-contain"
          />
        </div>
        <div>
          <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
            UniDev
          </h1>
          <p class="text-xs text-gray-400">Conectando Talentos</p>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-8">
        <ul class="flex items-center space-x-6">
          <li *ngFor="let item of navItems">
            <button
              type="button"
              (click)="navigate(item)"
              [class]="isActive(item) ? 'text-purple-400 border-b-2 border-purple-400 pb-1' : 'text-gray-300 hover:text-white transition-colors'"
              class="font-medium"
            >
              {{ item.label }}
            </button>
          </li>
        </ul>
        
        <div class="flex items-center">
          <a routerLink="/login" class="gradient-button gradient-button--compact gradient-button--filled">
            <span class="gradient-text gradient-text--opaque">Login</span>
          </a>
        </div>
      </nav>

      <!-- Mobile Menu Button -->
      <button 
        (click)="toggleMenu()"
        class="md:hidden p-2 text-gray-300 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                [attr.d]="isMenuOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16M4 18h16'">
          </path>
        </svg>
      </button>
    </div>

      <!-- Mobile Menu -->
      <div *ngIf="isMenuOpen" class="md:hidden py-4 border-t border-gray-700">
      <nav class="space-y-4">
        <button
          type="button"
          *ngFor="let item of navItems"
          (click)="navigate(item); closeMenu()"
          [class]="isActive(item) ? 'text-purple-400' : 'text-gray-300'"
          class="block py-2 hover:text-white transition-colors"
        >
          {{ item.label }}
        </button>
        <div class="pt-4">
          <a routerLink="/login" class="gradient-button gradient-button--filled w-full">
            <span class="gradient-text gradient-text--opaque">Login</span>
          </a>
        </div>
      </nav>
    </div>
  </div>
</header>
