<div class="preloader" *ngIf="!isReady">
  <div class="preloader__spinner"></div>
  <p>Cargando experiencia...</p>
</div>

<div id="content" class="content" #contentRoot [class.is-blurred]="!isReady">
  <div class="content__ambient" aria-hidden="true">
    <span class="ambient-orb ambient-orb--violet"></span>
    <span class="ambient-orb ambient-orb--cyan"></span>
    <span class="ambient-orb ambient-orb--rose"></span>
  </div>

  <app-hero-intro-section [typewriterTexts]="typewriterTexts" [stats]="stats"></app-hero-intro-section>
  <app-hero-features-section [features]="features"></app-hero-features-section>
  <app-hero-steps-section [reasons]="reasons" [steps]="steps"></app-hero-steps-section>
  <app-hero-final-cta-section></app-hero-final-cta-section>
  <footer class="content__footer">
  <div class="footer__inner">
    <div>
      <p class="footer__title">UniDev</p>
      <p class="footer__subtitle">Conectando talento universitario con proyectos reales.</p>
    </div>
    <div class="footer__meta">
      <span>© {{ currentYear }} UniDev. Todos los derechos reservados.</span>
      <span>Hecho con pasión desde Unidev Studio.</span>
    </div>
  </div>
</footer>

</div>

<div data-app-container #threeContainer></div>
