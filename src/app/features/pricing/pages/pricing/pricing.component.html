<section class="pricing-page">
  <main class="pricing-shell">
    <section class="cards" #cardsContainer aria-label="Planes disponibles">
      <div class="cards__inner">
        <article
          #pricingCard
          *ngFor="let plan of plans"
          class="card"
          [attr.data-accent]="plan.accent"
        >
          <p class="card__eyebrow">{{ plan.kicker }}</p>
          <h2 class="card__heading">{{ plan.name }}</h2>
          <p class="card__price">{{ plan.price }}</p>
          <p class="card__period">{{ plan.period }}</p>
          <ul role="list" class="card__bullets flow">
            <li *ngFor="let feature of plan.features">{{ feature }}</li>
          </ul>
          <a [href]="plan.href" class="card__cta cta">{{ plan.cta }}</a>
        </article>
      </div>

      <div class="overlay cards__inner" #overlay aria-hidden="true">
        <article
          *ngFor="let plan of plans"
          class="card"
          [attr.data-accent]="plan.accent"
          aria-hidden="true"
        >
          <p class="card__eyebrow">{{ plan.kicker }}</p>
          <h2 class="card__heading">{{ plan.name }}</h2>
          <p class="card__price">{{ plan.price }}</p>
          <p class="card__period">{{ plan.period }}</p>
          <ul role="list" class="card__bullets flow">
            <li *ngFor="let feature of plan.features">{{ feature }}</li>
          </ul>
          <span class="card__cta cta">{{ plan.cta }}</span>
        </article>
      </div>
    </section>
  </main>
</section>
